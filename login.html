<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Summit Ascent</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-toggle-panel">
            <button type="button" class="btn btn-outline-secondary btn-sm theme-toggle-btn" id="theme-toggle" aria-pressed="false" aria-label="Toggle theme">
                <i class="bi bi-moon-stars"></i>
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="rtl-toggle">RTL</button>
        </div>
        <div class="auth-card">
            <div class="text-center mb-5">
                <a href="index.html" class="text-decoration-none">
                    <i class="bi bi-triangle-half display-4 text-primary"></i>
                    <h2 class="fw-bold text-uppercase mt-3 mb-0">Summit Ascent</h2>
                </a>
                <p class="text-muted small mt-2">Log in to your account</p>
            </div>
            <form action="index.html" class="needs-validation" novalidate>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase ls-1">Email Address</label>
                    <input type="email" class="form-control py-3 border-2" placeholder="john@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase ls-1">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control py-3 border-2 border-end-0" id="loginPassword" placeholder="••••••••" required>
                        <span class="input-group-text bg-white border-2 border-start-0" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small" for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="small text-primary text-decoration-none fw-bold">Forgot password?</a>
                </div>
                
                <div class="form-check mb-4">
                    <input type="checkbox" class="form-check-input" id="loginTerms">
                    <label class="form-check-label small" for="loginTerms">I agree to the <a href="#" class="text-primary fw-bold text-decoration-none">Terms &amp; Conditions</a></label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow mb-4">LOG IN</button>
                
                <div class="text-center mb-4">
                    <span class="small text-muted text-uppercase fw-bold ls-1">OR CONTINUE WITH</span>
                </div>
                
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <button type="button" class="btn btn-outline-secondary w-100 py-2 small fw-bold">
                            <i class="bi bi-google me-2"></i> GOOGLE
                        </button>
                    </div>
                    <div class="col-6">
                        <button type="button" class="btn btn-outline-secondary w-100 py-2 small fw-bold">
                            <i class="bi bi-apple me-2"></i> APPLE
                        </button>
                    </div>
                </div>
                
                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">SIGN UP</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Password Toggle
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('loginPassword');
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleBtn.querySelector('i').classList.toggle('bi-eye');
            toggleBtn.querySelector('i').classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
